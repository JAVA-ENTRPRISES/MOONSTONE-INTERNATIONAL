<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Moonstone Header</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
/>
<style>
  .nav-link.active {
        color: #e639b2;
        font-weight: bold;
        border-bottom: 2px solid #170b7d;
        padding-bottom: 4px;
      }
</style>

</head>

<body class="bg-gray-100">

<!-- TOP BAR -->
<div class="bg-gradient-to-r from-purple-800 to-pink-600 text-white text-sm">
  <div class="max-w-7xl mx-auto flex justify-between px-6 py-2">

    <div class="flex gap-6">
      <span>📞 +91 9407641004</span>
      <span>✉ moonstoneschooljagdalpur@gmail.com</span>
    </div>

    <div class="flex gap-4 text-lg">
      <i class="fab fa-facebook hover:text-pink-200 cursor-pointer"></i>
      <i class="fab fa-instagram hover:text-pink-200 cursor-pointer"></i>
      <i class="fab fa-youtube hover:text-pink-200 cursor-pointer"></i>
    </div>

  </div>
</div>

<!-- HEADER -->
<header id="header"
  class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg transition-all duration-300">

  <div id="navContainer"
    class="max-w-8xl mx-auto px-16 py-4 flex items-center justify-between transition-all duration-300">

    <!-- LOGO -->
    <div class="flex items-center gap-3">
      <img id="logo" src="images/logo.jpeg"
        class="h-14 rounded-full shadow-md transition-all duration-300">

      <div>
        <h1 class="text-lg font-bold text-purple-900">
          MOONSTONE INTERNATIONAL SCHOOL
        </h1>
        <p class="text-xs text-gray-500">
          Dreams • Goals • Success
        </p>
      </div>
    </div>

    <!-- NAV -->
    <nav class="hidden md:flex gap-8 font-medium text-gray-700">

      <a href="index.html" class="nav-link hover:text-pink-500 transition">Home</a>
      <a href="about.html" class="nav-link hover:text-pink-500 transition">About</a>
      <a href="academic.html" class="nav-link hover:text-pink-500 transition">Academics</a>
      <a href="admission.html" class="nav-link hover:text-pink-500 transition">Admissions</a>
      <a href="mandatory-disclosure.html" class="nav-link hover:text-pink-500 transition">Mandatory Disclosure</a>
      <a href="gallery.html" class="nav-link hover:text-pink-500 transition">Gallery</a>
      <a href="contact.html" class="nav-link hover:text-pink-500 transition">Contact</a>

    </nav>

    <!-- BUTTONS -->
    <div class="hidden md:flex items-center gap-4">

      <a href="#"
        class="px-4 py-2 border border-pink-500 text-pink-500 rounded-full hover:bg-pink-500 hover:text-white transition">
        Login
      </a>

      <a href="#"
        class="px-5 py-2 bg-gradient-to-r from-pink-500 to-purple-600 text-white rounded-full shadow-lg hover:scale-105 transition">
        Enroll Now
      </a>

    </div>

    <!-- MOBILE BUTTON -->
    <button onclick="openMenu()" class="md:hidden text-3xl text-purple-700">
      ☰
    </button>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu"
    class="fixed top-0 left-0 w-72 h-full bg-white shadow-xl p-6 transform -translate-x-full transition duration-300 z-50">

    <div class="flex justify-between items-center mb-6">
      <h2 class="font-bold text-lg text-purple-700">Menu</h2>
      <span onclick="closeMenu()" class="text-2xl cursor-pointer">×</span>
    </div>

    <nav class="flex flex-col gap-5 text-gray-700 font-medium">
      <a href="index.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="academic.html" class="nav-link">Academics</a>
      <a href="admission.html" class="nav-link">Admissions</a>
      <a href="mandatory-disclosure.html" class="nav-link">Mandatory Disclosure</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="contact.html" class="nav-link">Contact</a>

      <a href="#"
        class="bg-gradient-to-r from-pink-500 to-purple-600 text-white px-4 py-2 rounded-lg text-center mt-4 shadow">
        Enroll Now
      </a>
    </nav>

  </div>

  <!-- OVERLAY -->
  <div id="overlay"
    class="fixed inset-0 bg-black/40 hidden z-40"
    onclick="closeMenu()"></div>

</header>



</body>
</html>
