<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Moonstone International School</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>

<body class="bg-gray-50">

<div id="header"></div>

<!-- HERO -->
<section class="relative py-24 text-center text-white">

  <div class="absolute inset-0 bg-gradient-to-r from-purple-900 to-pink-600"></div>

  <div class="relative z-10">
    <h1 class="text-5xl font-bold mb-3">Photo Gallery</h1>
    <p class="text-gray-200">Capturing moments of excellence & joy</p>
  </div>

</section>

<!-- FILTER -->
<section class="py-10 bg-white">
<div class="max-w-6xl mx-auto text-center">

<div class="flex flex-wrap justify-center gap-4">

<button onclick="filterImages('all', this)"
class="filter-btn bg-gradient-to-r from-purple-700 to-pink-500 text-white px-5 py-2 rounded-full shadow">
All</button>

<button onclick="filterImages('event', this)"
class="filter-btn bg-gray-200 px-5 py-2 rounded-full">
Events</button>

<button onclick="filterImages('sports', this)"
class="filter-btn bg-gray-200 px-5 py-2 rounded-full">
Sports</button>

<button onclick="filterImages('activity', this)"
class="filter-btn bg-gray-200 px-5 py-2 rounded-full">
Activities</button>

</div>

</div>
</section>

<!-- GALLERY GRID -->
<section class="py-16">
<div class="max-w-7xl mx-auto px-6 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

<!-- ITEM -->
<div class="gallery-item event group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/annual.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Annual Day</div>
</div>

<div class="gallery-item sports group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/sport.webp"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Sports Day</div>
</div>

<div class="gallery-item activity group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/science.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Science Exhibition</div>
</div>

<div class="gallery-item event group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/cul.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Cultural Program</div>
</div>

<div class="gallery-item activity group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/act.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Classroom Activity</div>
</div>

<div class="gallery-item event group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/assembly.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Morning Assembly</div>
</div>

<div class="gallery-item event group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/teacher.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Teacher's Day</div>
</div>

<div class="gallery-item activity group relative cursor-pointer overflow-hidden rounded-xl"
onclick="openModal(this)">
  <img src="images/tree.jpg"
    class="w-full h-60 object-cover group-hover:scale-110 transition duration-300">
  <div class="overlay">Plantation Drive</div>
</div>

</div>
</section>

<!-- MODAL -->
<div id="modal"
class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

<span onclick="closeModal()"
class="absolute top-6 right-8 text-white text-3xl cursor-pointer">&times;</span>

<img id="modalImg"
class="max-w-5xl w-full rounded-xl shadow-lg">

</div>

<!-- STYLES -->
<style>
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 14px;
  color: white;
  font-size: 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  opacity: 0;
  transition: 0.3s;
}
.gallery-item:hover .overlay {
  opacity: 1;
}
</style>

<!-- SCRIPT -->
<script>
function filterImages(category, btn) {
  let items = document.querySelectorAll('.gallery-item');
  let buttons = document.querySelectorAll('.filter-btn');

  buttons.forEach(b => {
    b.classList.remove('bg-gradient-to-r','from-purple-700','to-pink-500','text-white');
    b.classList.add('bg-gray-200');
  });

  btn.classList.remove('bg-gray-200');
  btn.classList.add('bg-gradient-to-r','from-purple-700','to-pink-500','text-white');

  items.forEach(item => {
    if (category === 'all' || item.classList.contains(category)) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
}

function openModal(el) {
  let img = el.querySelector('img').src;
  document.getElementById('modalImg').src = img;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
</script>

<div id="footer"></div>

<script src="js/main.js"></script>

</body>
</html>
